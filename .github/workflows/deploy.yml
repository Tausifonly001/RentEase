name: Deploy RentEase

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_pgsql, pgsql
          tools: composer, phpstan
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Check for leaked secrets
        run: |
          UNTRACKED=$(git ls-files --others --ignored --exclude-standard .env)
          if [ -n "$UNTRACKED" ]; then
            echo "::error:: .env is untracked but not ignored — remove it immediately"
            exit 1
          fi
          if [ -f .env ] && git ls-files .env | grep -q .; then
            echo "::error:: .env is committed — remove it immediately"
            exit 1
          fi
          if ! echo ".env" | git check-ignore --stdin --no-index > /dev/null 2>&1; then
            echo "::error:: .env is not in .gitignore — add it now"
            exit 1
          fi
          echo "No secrets detected in git tracking"

      - name: PHPStan static analysis
        run: vendor/bin/phpstan analyse --no-progress --error-format=github

  deploy:
    name: Deploy to Render
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK secret not set — skipping deploy"
            exit 0
          fi
          curl -sS -X POST "$RENDER_DEPLOY_HOOK" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}'
